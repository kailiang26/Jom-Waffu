<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jom Waffu 记账系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4 max-w-4xl mx-auto">
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-indigo-600">Jom Waffu 账本</h1>
        <span id="sync-status" class="text-xs bg-gray-200 px-2 py-1 rounded">正在连接...</span>
    </header>

    <section class="bg-white p-6 rounded-xl shadow mb-6">
        <div class="space-y-4">
            <div class="flex gap-2">
                <button onclick="setMode('expense')" class="flex-1 py-2 bg-red-100 text-red-600 font-bold rounded">支出 (-)</button>
                <button onclick="setMode('income')" class="flex-1 py-2 bg-green-100 text-green-600 font-bold rounded">收入 (+)</button>
            </div>
            <input type="number" id="amount" class="w-full p-3 border rounded" placeholder="金额 (RM)">
            <input type="text" id="desc" class="w-full p-3 border rounded" placeholder="备注">
            <button onclick="handleRecord()" class="w-full py-3 bg-indigo-600 text-white font-bold rounded">提交记录</button>
        </div>
    </section>

    <div id="history" class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold mb-4">记录明细</h2>
        <div id="list-container" class="space-y-2"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://tarphzrscdmmznosxuzc.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_IOOU_7JHMUXwlX7hqzoCBQ_Om5zUHMq";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let mode = 'expense';
        function setMode(m) { mode = m; }

        async function handleRecord() {
            const amount = parseFloat(document.getElementById('amount').value);
            const desc = document.getElementById('desc').value;
            if (!amount) return alert("请输入金额");

            const { error } = await supabase.from('records').insert([{
                id: Date.now(),
                timestamp: Date.now(),
                mode: mode,
                amount: amount,
                desc: desc,
                dateStr: new Date().toLocaleDateString()
            }]);
            
            if (error) alert("保存失败: " + error.message);
            else { alert("保存成功"); location.reload(); }
        }

        async function loadData() {
            const { data, error } = await supabase.from('records').select('*').order('id', { ascending: false });
            if (error) {
                document.getElementById('sync-status').innerText = "❌ 连接错误";
            } else {
                document.getElementById('sync-status').innerText = "✅ 已同步";
                const container = document.getElementById('list-container');
                container.innerHTML = data.map(r => `
                    <div class="flex justify-between border-b p-2">
                        <span>${r.dateStr} | ${r.desc}</span>
                        <span class="font-bold ${r.mode === 'income' ? 'text-green-600' : 'text-red-600'}">
                            ${r.mode === 'income' ? '+' : '-'}${r.amount}
                        </span>
                    </div>
                `).join('');
            }
        }
        loadData();
    </script>
</body>
</html>
